<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Dashboard</title>
    <link rel="stylesheet" href="/src/output.css">

    <!-- Basic Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <!-- Filled Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
    <!-- Brand Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">
</head>

<body class="bg-[#cfd6d3] flex justify-center">

    <div class="w-full max-w-sm  min-h-screen flex flex-col" style="background-image: url('/src/assets/758f4ef650e0af254af535effe1ab8f27c99480f.png');">

        <section class="relative h-50 bg-cover bg-center rounded-bl-2xl"
            style="background-image:url('/src/assets/div.elementor-repeater-item-8f878b7.png');">

            <div class="absolute inset-0 bg-black/30 rounded-bl-2xl"></div>

            <div class="relative z-10 flex justify-between px-5 pt-3 text-black font-medium">
                <span>9:41</span>
                <div class="flex gap-2 text-xl">
                    <i class='bx bx-signal-5'></i>
                    <i class='bx bx-wifi'></i>
                    <i class="bxf bx-battery"></i>
                </div>
            </div>

            <div class="relative flex justify-between items-center z-10 px-6 mt-10 text-white">
                <div>
                    <h1 class="text-4xl font-semibold leading-tight">
                        Hi , Amal
                    </h1>
                    <p class="text-3xl font-medium opacity-90">Dashboard</p>
                </div>
                <div>
                    <img src="/src/assets/Ellipse 11.png" alt="">
                </div>
            </div>
        </section>

        <div class="flex-1 pt-14 px-6 relative">

            <!-- SEARCH -->
            <div class="bg-[#e2b63f] rounded-xl flex items-center justify-between px-5 py-4 text-white shadow">
              <input type="text" placeholder="Search here...." class="focus:outline-0 border-0">
               
                    <i class='bx bx-search text-xl'></i>
            </div>

            <!-- CARDS -->
            <div class="grid grid-cols-2 gap-6 mt-10">

                <!-- CARD -->
                <div class="bg-gray-100 rounded-2xl border-2 border-black p-6 flex flex-col items-center shadow-sm">
                    <div class="w-16 h-16 rounded-full bg-green-400 flex items-center justify-center mb-3">
                       <img src="/src/assets/Rectangle 4.png" alt="" class="object-cover">
                    </div>
                    <p class="text-lg">Articles</p>
                </div>

                <div class="bg-gray-100 rounded-2xl border-2 border-black p-6 flex flex-col items-center shadow-sm">
                    <div class="w-16 h-16 rounded-full bg-orange-200 flex items-center justify-center mb-3">
                       <img src="/src/assets/Rectangle 5.png" alt="">
                    </div>
                    <p class="text-lg">Market</p>
                </div>

                <div class="bg-gray-100 rounded-2xl border-2 border-black p-6 flex flex-col items-center shadow-sm">
                    <div class="w-16 h-16 rounded-full bg-orange-300 flex items-center justify-center mb-3">
                   <img src="/src/assets/Rectangle 7.png" alt="">
                    </div>
                    <p class="text-lg">Guide</p>
                </div>

                <div class="bg-gray-100 rounded-2xl border-2 border-black p-6 flex flex-col items-center shadow-sm">
                    <div class="w-16 h-16 rounded-full bg-yellow-400 flex items-center justify-center mb-3">
                     <img src="/src/assets/Rectangle 8.png" alt="">
                    </div>
                    <p class="text-lg">Reports</p>
                </div>
            </div>
        </div>
        <nav class="h-16 bg-white mb-0 flex items-center justify-around text-3xl">
            <i class='bx bx-home'></i>
            <i class='bx bx-menu'></i>
            <i class='bx bx-user-circle'></i>
           <i class="bxf bx-arrow-out-left-square-half"></i>
        </nav>
    </div>

</body>

</html>
