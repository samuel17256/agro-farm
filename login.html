<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro - Farm</title>
    <link rel="stylesheet" href="/src/output.css">
    <!-- Basic Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <!-- Filled Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
    <!-- Brand Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">
</head>

<body class="min-h-screen m-0 p-0 flex justify-center bg-black">

    <div class="w-full max-w-sm min-h-screen">
        <section class="min-h-screen w-full flex flex-col items-center justify-center relative text-center
bg-cover bg-center bg-no-repeat" style="background-image:url(/src/assets/unsplash_b-0-LM0wzWM.png);">
            <div class="absolute inset-0 bg-black/20"></div>
            <nav class="relative z-10 w-full flex items-center justify-between px-6 pt-5 text-white">
                <div class="text-lg">9:41</div>
                <div class="text-lg flex gap-2">
                    <i class="bxf bx-signal-5"></i>
                    <i class="bxf bx-wifi"></i>
                    <i class="bxf bx-battery"></i>
                </div>
            </nav>

            <div class="relative z-10 flex flex-col items-center justify-center text-center px-6 flex-1">
                <img src="/src/assets/Ellipse 3.png" alt="" class="h-48 object-contain">
                <div class="py-6 text-white max-w-md space-y-2">
                    <p class="text-lg">
                        Already have an account?<br>
                        <span class="text-[#CDD129]">Login AgroForm</span>
                    </p>
                    <p class="text-lg">
                        Don't have an account?
                        <span class="text-[#CDD129]">Register now</span>
                    </p>
                </div>

                <div class="flex justify-center mt-4 w-full">
                    <div class="flex items-center bg-[#D9D9D9] px-4 py-3 rounded-3xl w-full max-w-xs">
                        <input type="text" placeholder="Username"
                            class="bg-transparent flex-1 outline-none text-black placeholder:text-gray-600" />

                        <i class="bx bx-user-check text-xl text-black"></i>
                    </div>
                </div>

                <a href="dashboard.html" class="mt-8">
                    <button class="bg-[#FAFF00] px-6 py-2 flex items-center rounded-3xl text-black gap-3 font-light">
                        Login
                        <i class="bx bx-arrow-in-right-square-half"></i>
                    </button>
                </a>
                <div class="border-b-4 mt-auto border-white w-40 rounded"></div>
            </div>
        </section>
    </div>

</body>

</html>
