<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet" href="/src/output.css">
    <!-- Basic Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <!-- Filled Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
    <!-- Brand Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">
</head>

<body class="bg-[#8FAE79] flex justify-center min-h-screen">

    <!-- MOBILE FRAME -->
    <div class="w-full max-w-sm min-h-screen px-5 py-4 flex flex-col">

        <!-- STATUS -->
        <div class="flex justify-between text-black text-lg mb-3">
            <span>9:41</span>
            <div class="flex gap-2 text-xl">
                <i class='bx bx-signal-5'></i>
                <i class='bx bx-wifi'></i>
                <i class='bxf bx-battery'></i>
            </div>
        </div>

        <!-- HEADER CARD -->
        <div class="bg-gray-100 rounded-3xl p-6 flex items-center justify-between relative shadow-sm">
            <a href="featured_product.html" class="no-underline">
                <i class='bx bx-arrow-left text-2xl'></i>
            </a>
            <h1 class="text-xl font-semibold text-gray-700">Payment</h1>
        </div>
        <!-- PRICE DETAILS -->
        <div class="bg-gray-100 rounded-2xl p-5 mt-6 text-gray-700 space-y-3">
            <div class="flex justify-between">
                <span class="font-medium">Price Amount</span>
                <span>Rs.1500/=</span>
            </div>
            <div class="flex justify-between">
                <span class="font-medium">Category</span>
                <span class="text-gray-500">NPK -15</span>
            </div>

            <hr>

            <div class="flex justify-between text-sm">
                <span class="font-medium">Delivery</span>
                <span>3 - 4 Day</span>
            </div>

            <div class="flex justify-between text-sm">
                <span class="font-medium">Seller</span>
                <span>Saman</span>
            </div>

        </div>

        <!-- CARD DETAILS -->
        <div class="bg-gray-100 rounded-2xl p-5 mt-6">

            <div class="flex justify-between items-center mb-4">
                <p class="font-medium text-gray-700">Enter Card Details</p>

                <div class="flex items-center gap-3 font-bold text-lg">
                    <span class="text-blue-900">VISA</span>
                    <span class="text-red-500">●</span>
                    <span class="text-orange-400">●</span>
                </div>
            </div>

            <div class="bg-gray-200 rounded-xl p-5 text-center">
                <p class="text-2xl font-semibold text-gray-700">
                    Total amount : 1500/=
                </p>
            </div>

        </div>

        <div class="bg-gray-100 rounded-full px-6 py-4 mt-6 flex justify-between items-center">
            <span class="italic text-lg text-gray-700">Contact Seller</span>
            <i class='bxf bx-phone-ring text-2xl'></i>
        </div>

        <div class="flex gap-10 px-2 py-5 items-center border-r border-r-white">
            <img src="/src/assets/Icon.png" alt="">
            <p class="flex flex-col">
                <span class="font-medium text-2xl">Free shipping</span>
                <span class="text-gray-700">on All orders Over Rs.5000.00</span>
            </p>
        </div>

        <a href="success.html" class="no-underline text-center">
            <button class="bg-[#EB8E1A] cursor-pointer text-white text-2xl w-full rounded-2xl py-3 shadow border border-black">
                Pay Now
            </button>
        </a>
        <div class="flex justify-center mt-4">
            <div class="w-24 h-1 bg-black/70 rounded-full"></div>
        </div>

    </div>

</body>

</html>
