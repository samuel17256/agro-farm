<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Featured - Products</title>
    <link rel="stylesheet" href="/src/output.css">

    <!-- Basic Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <!-- Filled Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
    <!-- Brand Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">
</head>

<body class="bg-[#cfd6d3] flex justify-center">

    <!-- PHONE FRAME WIDTH -->
    <div class="w-full max-w-sm min-h-screen flex flex-col"
        style="background-image: url('/src/assets/758f4ef650e0af254af535effe1ab8f27c99480f.png');">
        <!-- HERO -->
        <section class="relative h-30 bg-cover bg-center"
            style="background-image:url('/src/assets/7d79faac14c2460b003ee8640886f80f9dc9a70b.jpg');">

            <div class="absolute bg-black/30"></div>
            <div class="flex mt-16 items-center gap-18 text-white text-3xl">
                <a href="dashboard.html" class="no-underline">
                    <i class="bx bx-arrow-left"></i>
                </a>
                Market place
            </div>
        </section>
        <!-- CONTENT AREA -->
        <div class="flex-1 pt-14 pb-10 relative">
            <div class="flex items-center justify-between py-4">
                <p class="text-lg font-bold">Featured Products</p>
                <button class="border-0 bg-[#49A760] px-8 text-white py-1 rounded-xl text-center">All</button>
                <button class="bg-[#ffff] px-2 rounded-lg border border-gray-400 py-1 font-medium">Organic</button>
                <button class="bg-[#ffff] px-2 rounded-lg border border-gray-400 py-1 font-medium">NPK</button>
            </div>

            <!-- CARDS -->
            <div class="flex flex-col gap-6 mt-10">
                <!-- CARD -->
                <div class="bg-gray-100 rounded-2xl flex items-center shadow-sm justify-between px-2">
                    <div>
                        <img src="/src/assets/Rectangle 1063.png" alt="" class="object-cover">
                    </div>
                    <div class="flex flex-col mt-4">
                        <p class="text-[#666666] uppercase text-lg">Organic</p>
                        <p class="text-2xl font-medium text-[#04000B]">NPK -0:0:50</p>
                        <p class="text-lg text-[#49A760] font-bold">Rs.2400/=</p>
                        <a href="details.html" class="no-underline">
                            <button
                                class="flex items-center gap-3 font-bold rounded-2xl border-2 border-[#F7C35F] px-4 py-2 cursor-pointer">
                                <i class="bxf bx-shopping-bag"></i>
                                SHOP NOW
                            </button>
                        </a>
                    </div>
                </div>
                <div class="bg-gray-100 rounded-2xl flex items-center shadow-sm justify-between px-2">
                    <div class="py-4">
                        <img src="/src/assets/Rectangle 17.png" alt="" class="h-40">
                    </div>
                    <div class="flex flex-col mt-4">
                        <p class="text-[#666666] uppercase text-lg">Organic</p>
                        <p class="text-2xl font-medium text-[#04000B]">NPK 15:15:15</p>
                        <p class="text-lg text-[#49A760] font-bold">Rs.1500/=</p>
                        <a href="details.html" class="no-underline">
                            <button
                                class="flex items-center gap-3 font-bold rounded-2xl border-2 border-[#F7C35F] px-4 py-2 cursor-pointer">
                                <i class="bxf bx-shopping-bag"></i>
                                SHOP NOW
                            </button>
                    </div>
                </div>
                <div class="bg-gray-100 rounded-2xl flex items-center shadow-sm justify-between px-2">
                    <div>
                        <img src="/src/assets/Rectangle 1063.png" alt="" class="object-cover">
                    </div>
                    <div class="flex flex-col mt-4">
                        <p class="text-[#666666] uppercase text-lg">Organic</p>
                        <p class="text-2xl font-medium text-[#04000B]">NPK 19:19:19</p>
                        <p class="text-lg text-[#49A760] font-bold">Rs.1800/=</p>
                        <a href="details.html" class="no-underline">
                            <button
                                class="flex items-center gap-3 font-bold rounded-2xl border-2 border-[#F7C35F] px-4 py-2 cursor-pointer">
                                <i class="bxf bx-shopping-bag"></i>
                                SHOP NOW
                            </button>
                    </div>
                </div>
            </div>
        </div>
        <!-- BOTTOM NAV -->
        <nav class="h-16 bg-white mb-0 flex items-center justify-around text-3xl">
            <i class='bx bx-home'></i>
            <i class='bx bx-menu'></i>
            <i class='bx bx-user-circle'></i>
            <i class="bxf bx-arrow-out-left-square-half"></i>
        </nav>

    </div>

</body>

</html>
